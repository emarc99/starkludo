[package]
cairo-version = "=2.9.2"
name = "starkludo"
version = "0.1.0"

[cairo]
sierra-replace-ids = true

[scripts]
migrate = "sozo build && sozo migrate"                      # scarb run migrate
spawn = "sozo execute dojo_starter-actions spawn --wait"    # scarb run spawn
move = "sozo execute dojo_starter-actions move -c 1 --wait" # scarb run move

[profile.sepolia]

[profile.mainnet]

[dependencies]
dojo = { git = "https://github.com/dojoengine/dojo", tag = "v1.1.2" }
origami_random = { git = "https://github.com/dojoengine/origami" }

[[target.starknet-contract]]
build-external-contracts = ["dojo::world::world_contract::world"]

[dev-dependencies]
assert_macros = "=2.9.2"
cairo_test = "=2.9.2"
dojo_cairo_test = { git = "https://github.com/dojoengine/dojo", tag = "v1.1.2" }
